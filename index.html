<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReportAI — маркетинговые отчёты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-a: #0a0a1a;
      --bg-b: #1a0533;
      --text: #f4f4f8;
      --text-muted: rgba(244, 244, 248, 0.55);
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --input-bg: rgba(8, 6, 20, 0.45);
      --error: #fb7185;
      --success: #86efac;
      --radius: 16px;
      --font: "Inter", system-ui, -apple-system, sans-serif;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: var(--font);
      color: var(--text);
      line-height: 1.55;
      background: linear-gradient(165deg, var(--bg-a) 0%, var(--bg-b) 55%, #0d0618 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: blob-float 18s var(--ease-out) infinite;
    }

    .blob-1 {
      width: min(42vw, 380px);
      height: min(42vw, 380px);
      background: #6366f1;
      top: -8%;
      left: -6%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: min(50vw, 460px);
      height: min(50vw, 460px);
      background: #7c3aed;
      bottom: -12%;
      right: -10%;
      animation-delay: -6s;
      animation-duration: 22s;
    }

    .blob-3 {
      width: min(38vw, 340px);
      height: min(38vw, 340px);
      background: #0ea5e9;
      top: 38%;
      left: 45%;
      transform: translateX(-50%);
      animation-delay: -11s;
      animation-duration: 20s;
      opacity: 0.4;
    }

    @keyframes blob-float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(4%, 6%) scale(1.06); }
      66% { transform: translate(-5%, 3%) scale(0.96); }
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fade-in-up 0.65s var(--ease-out) both;
    }

    .animate-in-delay-1 { animation-delay: 0.08s; }
    .animate-in-delay-2 { animation-delay: 0.16s; }
    .animate-in-delay-3 { animation-delay: 0.24s; }

    .hidden {
      display: none !important;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
      gap: 1rem;
    }

    .brand {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, #a78bfa 0%, #818cf8 35%, #38bdf8 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-height: 2.25rem;
    }

    .topbar-right.is-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .user-pill {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .user-pill { max-width: 120px; }
    }

    .btn-ghost {
      padding: 0.5rem 0.9rem;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-ghost:active {
      transform: scale(0.98);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 1.25rem 3rem;
    }

    .wrap--wide {
      max-width: 640px;
    }

    .panel-title {
      margin: 0 0 0.35rem;
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .panel-sub {
      margin: 0 0 1.5rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      padding: 4px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .auth-tabs .tab {
      flex: 1;
      padding: 0.6rem 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .auth-tabs .tab.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.25);
    }

    #auth-msg {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.875rem;
      display: none;
    }

    #auth-msg.visible {
      display: block;
    }

    #auth-msg.error {
      border: 1px solid rgba(251, 113, 133, 0.45);
      background: rgba(251, 113, 133, 0.1);
      color: #fecdd3;
    }

    #auth-msg.ok {
      border: 1px solid rgba(134, 239, 172, 0.4);
      background: rgba(134, 239, 172, 0.08);
      color: var(--success);
    }

    form.glass-form {
      padding: 1.5rem 1.35rem 1.6rem;
    }

    label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .field {
      margin-bottom: 1.05rem;
    }

    .field:last-of-type {
      margin-bottom: 1.2rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 0.95rem;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 11px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(244, 244, 248, 0.28);
    }

    input:hover {
      border-color: rgba(255, 255, 255, 0.16);
    }

    input:focus {
      outline: none;
      border-color: rgba(129, 140, 248, 0.65);
      box-shadow:
        0 0 0 3px rgba(99, 102, 241, 0.25),
        0 0 24px rgba(56, 189, 248, 0.12);
      background: rgba(8, 6, 20, 0.55);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.88rem 1rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      background: linear-gradient(115deg, #7c3aed 0%, #6366f1 45%, #0ea5e9 100%);
      background-size: 120% 100%;
      box-shadow:
        0 4px 20px rgba(99, 102, 241, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.25s;
    }

    button[type="submit"]:hover:not(:disabled) {
      filter: brightness(1.08);
      box-shadow:
        0 6px 28px rgba(124, 58, 237, 0.45),
        0 0 40px rgba(14, 165, 233, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }

    button[type="submit"]:active:not(:disabled) {
      transform: scale(0.992);
    }

    button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .app-intro {
      margin-bottom: 1.35rem;
    }

    .app-intro h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .app-intro p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .result-wrap {
      margin-top: 1.75rem;
    }

    .result-wrap > h2 {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 0 0 0.75rem;
    }

    .result-card {
      padding: 0;
      overflow: hidden;
    }

    .result-card-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.15);
    }

    .ai-badge {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.5), rgba(14, 165, 233, 0.35));
      border: 1px solid rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
    }

    .ai-badge svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    .result-card-title {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .result-card-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    #output {
      display: none;
      margin: 0;
      padding: 1.2rem 1.25rem 1.35rem;
      font-size: 0.9375rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3.5rem;
      color: rgba(244, 244, 248, 0.92);
      border: none;
      background: transparent;
      border-radius: 0;
    }

    #output.visible {
      display: block;
    }

    #output.error {
      color: #fecdd3;
      background: rgba(251, 113, 133, 0.08);
    }

    #output:not(.error).visible {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .cursor-blink::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 1em;
      margin-left: 2px;
      vertical-align: -0.15em;
      background: rgba(129, 140, 248, 0.9);
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-stage" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="topbar animate-in">
    <span class="brand">ReportAI</span>
    <div class="topbar-right is-hidden" id="topbar-user">
      <span id="user-display" class="user-pill" title=""></span>
      <button type="button" class="btn-ghost" id="logout-btn">Выйти</button>
    </div>
  </header>

  <main class="wrap" id="main-wrap">
    <div id="auth-panel">
      <div class="animate-in animate-in-delay-1">
        <h1 class="panel-title">Добро пожаловать</h1>
        <p class="panel-sub">Войдите или создайте аккаунт, чтобы генерировать отчёты.</p>
      </div>

      <div class="auth-tabs glass animate-in animate-in-delay-2">
        <button type="button" class="tab active" data-tab="login">Вход</button>
        <button type="button" class="tab" data-tab="register">Регистрация</button>
      </div>

      <div id="auth-msg" role="alert"></div>

      <form id="login-form" class="glass glass-form animate-in animate-in-delay-2" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="login-password">Пароль</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="login-btn">Войти</button>
      </form>

      <form id="register-form" class="glass glass-form hidden animate-in animate-in-delay-2" novalidate>
        <div class="field">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="reg-password">Пароль (мин. 6 символов)</label>
          <input id="reg-password" type="password" autocomplete="new-password" minlength="6" required />
        </div>
        <button type="submit" id="register-btn">Зарегистрироваться</button>
      </form>
    </div>

    <div id="app-panel" class="hidden">
      <div class="app-intro animate-in">
        <h1>Маркетинговый отчёт</h1>
        <p>Заполните данные за период — получите связный текст для клиента.</p>
      </div>

      <form id="report-form" class="glass glass-form animate-in animate-in-delay-1" novalidate>
        <div class="field">
          <label for="period">Период</label>
          <input id="period" name="period" type="text" placeholder="Апрель 2025" required />
        </div>
        <div class="field">
          <label for="sessions">Число визитов</label>
          <input id="sessions" name="sessions" type="number" min="0" step="1" placeholder="0" required />
        </div>
        <div class="field">
          <label for="conversions">Число конверсий</label>
          <input id="conversions" name="conversions" type="number" min="0" step="1" placeholder="0" required />
        </div>
        <div class="field">
          <label for="ad_spend">Рекламный бюджет USD</label>
          <input id="ad_spend" name="ad_spend" type="number" min="0" step="0.01" placeholder="0.00" required />
        </div>
        <div class="field">
          <label for="revenue">Доход USD</label>
          <input id="revenue" name="revenue" type="number" min="0" step="0.01" placeholder="0.00" required />
        </div>
        <button type="submit" id="submit-btn">Сгенерировать отчёт</button>
      </form>

      <div class="result-wrap animate-in animate-in-delay-2">
        <h2>Результат</h2>
        <div class="result-card glass" id="result-card">
          <div class="result-card-header">
            <div class="ai-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
              </svg>
            </div>
            <div>
              <div class="result-card-title">Отчёт сгенерирован ИИ</div>
              <div class="result-card-hint">Текст для клиента на русском языке</div>
            </div>
          </div>
          <div id="output" role="status"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var BASE = "https://reportai-production.up.railway.app";
      var TOKEN_KEY = "reportai_token";
      var EMAIL_KEY = "reportai_email";

      var authPanel = document.getElementById("auth-panel");
      var appPanel = document.getElementById("app-panel");
      var mainWrap = document.getElementById("main-wrap");
      var authMsg = document.getElementById("auth-msg");
      var loginForm = document.getElementById("login-form");
      var registerForm = document.getElementById("register-form");
      var tabButtons = document.querySelectorAll(".auth-tabs .tab");

      var reportForm = document.getElementById("report-form");
      var submitBtn = document.getElementById("submit-btn");
      var output = document.getElementById("output");
      var logoutBtn = document.getElementById("logout-btn");
      var userDisplay = document.getElementById("user-display");
      var topbarUser = document.getElementById("topbar-user");

      var typewriterId = 0;

      function syncUserChrome() {
        var email = localStorage.getItem(EMAIL_KEY) || "";
        if (email) {
          userDisplay.textContent = email;
          userDisplay.title = email;
          topbarUser.classList.remove("is-hidden");
        } else if (getToken()) {
          userDisplay.textContent = "Пользователь";
          userDisplay.title = "";
          topbarUser.classList.remove("is-hidden");
        } else {
          userDisplay.textContent = "";
          userDisplay.title = "";
          topbarUser.classList.add("is-hidden");
        }
      }

      function showAuthMsg(text, isError) {
        authMsg.textContent = text;
        authMsg.classList.add("visible");
        authMsg.classList.toggle("error", !!isError);
        authMsg.classList.toggle("ok", !isError);
      }

      function clearAuthMsg() {
        authMsg.classList.remove("visible", "error", "ok");
        authMsg.textContent = "";
      }

      function showApp() {
        authPanel.classList.add("hidden");
        appPanel.classList.remove("hidden");
        mainWrap.classList.add("wrap--wide");
        syncUserChrome();
      }

      function showAuth() {
        appPanel.classList.add("hidden");
        authPanel.classList.remove("hidden");
        mainWrap.classList.remove("wrap--wide");
        syncUserChrome();
      }

      function getToken() {
        return localStorage.getItem(TOKEN_KEY);
      }

      function setToken(t) {
        if (t) localStorage.setItem(TOKEN_KEY, t);
        else localStorage.removeItem(TOKEN_KEY);
      }

      function switchTab(name) {
        clearAuthMsg();
        tabButtons.forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-tab") === name);
        });
        if (name === "login") {
          loginForm.classList.remove("hidden");
          registerForm.classList.add("hidden");
        } else {
          loginForm.classList.add("hidden");
          registerForm.classList.remove("hidden");
        }
      }

      tabButtons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          switchTab(btn.getAttribute("data-tab"));
        });
      });

      function parseDetail(data) {
        if (!data.detail) return "Ошибка сервера";
        if (typeof data.detail === "string") return data.detail;
        try {
          return JSON.stringify(data.detail);
        } catch (e) {
          return "Ошибка сервера";
        }
      }

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearAuthMsg();
        var email = document.getElementById("login-email").value.trim();
        var password = document.getElementById("login-password").value;
        var btn = document.getElementById("login-btn");
        btn.disabled = true;
        try {
          var res = await fetch(BASE + "/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            showAuthMsg(parseDetail(data), true);
            return;
          }
          if (!data.access_token) {
            showAuthMsg("Нет токена в ответе.", true);
            return;
          }
          setToken(data.access_token);
          localStorage.setItem(EMAIL_KEY, email);
          showApp();
        } catch (err) {
          showAuthMsg("Не удалось связаться с сервером.", true);
        } finally {
          btn.disabled = false;
        }
      });

      registerForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearAuthMsg();
        var email = document.getElementById("reg-email").value.trim();
        var password = document.getElementById("reg-password").value;
        var btn = document.getElementById("register-btn");
        btn.disabled = true;
        try {
          var res = await fetch(BASE + "/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            showAuthMsg(parseDetail(data), true);
            return;
          }
          showAuthMsg("Аккаунт создан. Войдите с теми же данными.", false);
          document.getElementById("login-email").value = email;
          switchTab("login");
        } catch (err) {
          showAuthMsg("Не удалось связаться с сервером.", true);
        } finally {
          btn.disabled = false;
        }
      });

      logoutBtn.addEventListener("click", function () {
        setToken(null);
        localStorage.removeItem(EMAIL_KEY);
        showAuth();
        switchTab("login");
        output.classList.remove("visible", "error", "cursor-blink");
        output.textContent = "";
      });

      function showResult(text, isError) {
        typewriterId++;
        var runId = typewriterId;
        output.classList.remove("cursor-blink");
        output.classList.add("visible");
        output.classList.toggle("error", !!isError);

        if (isError) {
          output.textContent = text;
          return;
        }

        output.textContent = "";
        output.classList.add("cursor-blink");
        var i = 0;
        var speed = 14;
        function tick() {
          if (runId !== typewriterId) return;
          if (i <= text.length) {
            output.textContent = text.slice(0, i);
            i++;
            setTimeout(tick, speed);
          } else {
            output.classList.remove("cursor-blink");
          }
        }
        tick();
      }

      reportForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        output.classList.remove("visible", "error", "cursor-blink");
        typewriterId++;

        var token = getToken();
        if (!token) {
          showAuth();
          showAuthMsg("Сессия истекла. Войдите снова.", true);
          return;
        }

        var period = document.getElementById("period").value.trim();
        var sessions = parseInt(document.getElementById("sessions").value, 10);
        var conversions = parseInt(document.getElementById("conversions").value, 10);
        var adSpend = parseFloat(document.getElementById("ad_spend").value);
        var revenue = parseFloat(document.getElementById("revenue").value);

        if (!period || isNaN(sessions) || isNaN(conversions) || isNaN(adSpend) || isNaN(revenue)) {
          showResult("Проверьте, что все поля заполнены корректно.", true);
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Генерация…";
        try {
          var res = await fetch(BASE + "/generate-report", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify({
              period: period,
              sessions: sessions,
              conversions: conversions,
              ad_spend: adSpend,
              revenue: revenue,
            }),
          });
          var data = await res.json().catch(function () { return {}; });

          if (res.status === 401) {
            setToken(null);
            localStorage.removeItem(EMAIL_KEY);
            showAuth();
            showAuthMsg("Нужна повторная авторизация.", true);
            return;
          }

          if (!res.ok) {
            showResult(parseDetail(data), true);
            return;
          }

          if (typeof data.report !== "string") {
            showResult("Неожиданный формат ответа.", true);
            return;
          }

          showResult(data.report, false);
        } catch (err) {
          showResult("Не удалось связаться с сервером.", true);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Сгенерировать отчёт";
        }
      });

      if (getToken()) {
        showApp();
      } else {
        showAuth();
      }
    })();
  </script>
</body>
</html>
